augmentation:
  enabled: true
  images_per_original: 1
  perlin:
    anomaly_source_path: null
    blend_factor:
    - 0.1
    - 0.5
    enabled: false
    probability: 0.5
    rotation_range:
    - -90
    - 90
  pipeline:
  - p: 0.5
    type: HorizontalFlip
  - p: 0.5
    type: VerticalFlip
  - limit: 180
    p: 0.8
    type: Rotate
  - brightness_limit: 0.05
    contrast_limit: 0.05
    p: 0.5
    type: RandomBrightnessContrast
  seed: 3
evaluation:
  metrics:
  - Image AUROC
  - Image AUPRC
  - Image F1
  - Pixel AUROC
  - Pixel F1
  - Pixel AUPRC
  - Pixel AUPRO
  - Pixel AUPIMO
  primary_metric: Image AUROC
models:
  backbone_cnn: wide_resnet50_2
  backbone_layers:
  - layer2
  - layer3
  backbone_vit: dinov2reg_vit_base_14
  config:
    AnomalyDINO:
      batch_size: 16
      epochs: 1
      eval_batch_size: 1
      model_args:
        num_neighbours: 9
    Cfa:
      batch_size: 16
      epochs: 30
      model_args:
        gamma_c: 1
        gamma_d: 1
        num_hard_negative_features: 3
        num_nearest_neighbors: 3
        radius: 1.0e-05
    Cflow:
      batch_size: 16
      epochs: 200
      model_args:
        clamp_alpha: 1.9
        condition_vector: 128
        coupling_blocks: 8
        fiber_batch_size: 256
        permute_soft: false
    Csflow:
      batch_size: 16
      epochs: 240
      model_args:
        clamp: 3
        cross_conv_hidden_channels: 1024
        n_coupling_blocks: 4
    Dfkde:
      batch_size: 16
      epochs: 1
    Dfm:
      batch_size: 16
      epochs: 1
    Dinomaly:
      batch_size: 16
      epochs: 50
      model_args:
        bottleneck_dropout: 0.2
        decoder_depth: 8
    Draem:
      batch_size: 16
      epochs: 700
      model_args:
        beta:
        - 0.3
        - 0.8
        enable_sspcab: false
        sspcab_lambda: 0.1
    Dsr:
      batch_size: 16
      epochs: 200
      model_args:
        latent_anomaly_strength: 0.2
        upsampling_train_ratio: 0.7
    EfficientAd:
      epochs: 250
      eval_batch_size: 16
      model_args:
        pad_maps: true
        padding: false
        teacher_out_channels: 384
      train_batch_size: 1
    Fastflow:
      batch_size: 16
      epochs: 50
      eval_batch_size: 16
      model_args:
        conv3x3_only: false
        flow_steps: 8
        hidden_ratio: 1.0
        pre_trained: true
    Fre:
      batch_size: 16
      epochs: 1
      model_args:
        input_dim: 65536
        latent_dim: 220
        pooling_kernel_size: 2
        pre_trained: true
    Padim:
      batch_size: 16
      epochs: 1
      model_args:
        n_features: 550
    Patchcore:
      batch_size: 1
      epochs: 1
      model_args:
        coreset_sampling_ratio: 0.1
        num_neighbors: 9
    ReverseDistillation:
      batch_size: 16
      epochs: 200
    Stfpm:
      batch_size: 16
      epochs: 200
    SuperSimpleNet:
      batch_size: 8
      epochs: 300
      model_args:
        perlin_threshold: 0.2
        supervised: false
    Uflow:
      batch_size: 4
      epochs: 20
      model_args:
        affine_clamp: 2.0
        affine_subnet_channels_ratio: 1.0
        flow_steps: 8
        permute_soft: false
    UniNet:
      batch_size: 4
      epochs: 200
      model_args:
        temperature: 2
    WinClip:
      batch_size: 16
      epochs: 1
  gradient_models:
  - Fastflow
  - Cflow
  - Csflow
  - Uflow
  - UniNet
  image_only_models:
  - Dfkde
  - Dfm
  - WinClip
  to_run:
  - AnomalyDINO
  - Padim
  - Patchcore
  - WinClip
  - Fastflow
  - Uflow
paths:
  all_section_images: /content/drive/MyDrive/ADIRAS/datasets/AllSectionImages
  base_dataset_root: /content/drive/MyDrive/ADIRAS/datasets/
  draem_textures: /content/drive/MyDrive/ADIRAS/datasets/DRAEM_TEXTURES
  fewshot_dataset: /content/drive/MyDrive/ADIRAS/datasets/FewShot1344GridDataset_8020
  generated_anomalies: /content/drive/MyDrive/ADIRAS/datasets/generated_anomalies
  golden_unit_defects: /content/drive/MyDrive/ADIRAS/datasets/golden_unit_defects
  imagenette: /content/drive/MyDrive/ADIRAS/datasets/imagenette
  local_workspace: /content/local_workspace
  output_dir: /content/drive/MyDrive/ADIRAS/results_elma_benchmark/
  temp_checkpoints: /content/temp_checkpoints
  temp_results: /content/temp_results
project_dir: /content/drive/MyDrive/ADIRAS/anomaly_detection
run:
  allow_normal_only_categories: false
  categories:
  - Computer
  channel_shuffle_permutation:
  - 2
  - 0
  - 1
  colour_modes:
  - rgb
  data_source: MaskedDataset
  models_to_save: []
  save_run_models: false
  seeds:
  - 420
  use_folder_prompts: false
  winclip_manual_prompt: industrial PC with hardware defects
statistics:
  alpha: 0.05
  bonferroni: true
  bootstrap_on_raw: false
  ci_level: 0.95
  n_bootstrap: 10000
threshold:
  generative_ai:
    n_images: null
    n_samples_save: 10
    sensitivity_override: null
  hard:
    image_sensitivity: 0.5
    pixel_sensitivity: 0.5
  manual_anomalies:
    n_images: null
    n_samples_save: 10
    sensitivity_override: null
  method: NOISE_INJECTION
  noise_injection:
    active_methods:
    - gauss
    - noise_patch
    - color_patch
    - multiplicative
    - shot
    gaussian_std: null
    n_images: 15
    n_samples_save: 10
    patch_height:
    - 0.08
    - 0.3
    patch_holes:
    - 1
    - 3
    patch_width:
    - 0.08
    - 0.3
    sensitivity_override: null
    std_multiplier: 1.0
training:
  baseline_config: true
  batch_size: 16
  num_workers: 2
  resize_img: 256
  seed: 42
visualization:
  custom:
    colormap: 16
    enabled: true
    font_scale: 0.3
    font_thickness: 1
    mask_color:
    - 0
    - 0
    - 255
    mask_thickness: 2
    postproc:
      closing_kernel: 5
      enabled: true
      gaussian_sigma: 2.0
      min_defect_area: 10
  heatmap:
    enabled: false
    fields_config:
      anomaly_map:
        colormap: hot
        normalize: true
      gt_mask:
        alpha: 1
        color:
        - 255
        - 255
        - 255
        mode: fill
      image: {}
